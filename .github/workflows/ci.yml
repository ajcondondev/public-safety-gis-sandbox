name: CI

# Run the test suite and the full pipeline on every push / PR.
# Demonstrates CI/CD discipline: the project is proven to build from scratch
# on a clean machine, not just "it worked once on my laptop."

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.12" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install matplotlib   # optional enhancement, enables PNG map output in CI

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Run full pipeline (build all artifacts from scratch)
        run: python scripts/run_pipeline.py

      - name: Sanity-check key artifacts exist
        run: |
          test -f outputs/public_safety_gis.sqlite
          test -f outputs/reports/qa_qc_report.md
          test -f outputs/maps/interactive_map.html
          test -f outputs/dashboard/index.html
          test -f outputs/metadata/metadata.json
          echo "All key artifacts generated."

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gis-outputs-py${{ matrix.python-version }}
          path: |
            outputs/maps/
            outputs/dashboard/
            outputs/reports/
          if-no-files-found: error
